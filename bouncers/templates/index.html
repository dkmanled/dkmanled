<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOUNCERS Chile | Inteligencia de Mercado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { height: 500px; width: 100%; border-radius: 12px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
        .card-boliche { transition: transform 0.2s; }
        .card-boliche:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <nav class="border-b border-gray-800 p-4 sticky top-0 bg-gray-900 z-[1000]">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tighter">BOUNCERS <span class="text-indigo-500 text-sm font-semibold uppercase">Chile Edition</span></h1>
            </div>
            <div id="connection-status" class="hidden md:flex items-center space-x-2 bg-gray-800 px-4 py-2 rounded-full border border-gray-700">
                <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-xs font-medium text-gray-300">SISTEMA AUTÓNOMO ACTIVO</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

            <!-- Panel Lateral de Control -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                    <h2 class="text-lg font-bold mb-4 flex items-center text-indigo-400">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        RADAR DE BÚSQUEDA
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Ciudad Central (Chile)</label>
                            <input type="text" id="target-city" placeholder="Ej: Viña del Mar" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder-gray-600">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Radio de Acción</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="setRadius(100)" class="radius-btn bg-gray-900 border border-gray-700 py-2 rounded-lg text-sm hover:border-indigo-500 transition-colors">100 km</button>
                                <button onclick="setRadius(200)" class="radius-btn bg-gray-900 border border-gray-700 py-2 rounded-lg text-sm hover:border-indigo-500 transition-colors">200 km</button>
                                <button onclick="setRadius(400)" class="radius-btn bg-indigo-600 border border-indigo-500 py-2 rounded-lg text-sm font-bold">400 km</button>
                            </div>
                            <input type="hidden" id="search-radius" value="400">
                        </div>
                        <button id="start-scan" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-xl font-black text-sm uppercase tracking-widest shadow-lg shadow-indigo-900/20 transition-all active:scale-95">
                            INICIAR SPIDER CHILE
                        </button>
                    </div>
                </div>

                <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                    <h2 class="text-lg font-bold mb-4 flex items-center text-green-400">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                        MÉTRICAS
                    </h2>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center p-3 bg-gray-900 rounded-xl border border-gray-700">
                            <span class="text-xs text-gray-400 uppercase font-bold">Total Hallados</span>
                            <span id="stat-total" class="text-xl font-black text-indigo-400">0</span>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-gray-900 rounded-xl border border-gray-700">
                            <span class="text-xs text-gray-400 uppercase font-bold">Aptos Show</span>
                            <span id="stat-aptos" class="text-xl font-black text-green-400">0</span>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-gray-900 rounded-xl border border-gray-700">
                            <span class="text-xs text-gray-400 uppercase font-bold">Discoteques</span>
                            <span id="stat-discos" class="text-xl font-black text-blue-400">0</span>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-gray-900 rounded-xl border border-gray-700">
                            <span class="text-xs text-gray-400 uppercase font-bold">Tiene Teléfono</span>
                            <span id="stat-phone" class="text-xl font-black text-yellow-400">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Area Central: Mapa y Resultados -->
            <div class="lg:col-span-3 space-y-6">

                <!-- Mapa Interactivo -->
                <div class="bg-gray-800 p-2 rounded-2xl border border-gray-700 shadow-2xl relative">
                    <div id="map" class="z-0"></div>
                    <div class="absolute bottom-6 right-6 bg-gray-900/90 backdrop-blur px-4 py-2 rounded-lg border border-gray-700 z-[500] text-[10px] text-gray-400">
                        MAPA DE COBERTURA NACIONAL (CHILE)
                    </div>
                </div>

                <!-- Lista de Resultados -->
                <div class="bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden shadow-xl">
                    <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/50 backdrop-blur">
                        <h3 class="font-bold flex items-center uppercase text-sm tracking-widest">
                            <span class="flex h-2 w-2 rounded-full bg-red-500 mr-2 animate-pulse"></span>
                            Feed en Tiempo Real
                        </h3>
                        <div class="flex space-x-2">
                            <button onclick="toggleFilter('apto')" id="filter-apto" class="filter-btn text-[10px] bg-gray-900 px-3 py-1 rounded-full border border-gray-700 hover:border-green-500 transition-colors">APTO SHOW</button>
                            <button onclick="toggleFilter('disco')" id="filter-disco" class="filter-btn text-[10px] bg-gray-900 px-3 py-1 rounded-full border border-gray-700 hover:border-blue-500 transition-colors">DISCOTEQUES</button>
                            <button onclick="toggleFilter('phone')" id="filter-phone" class="filter-btn text-[10px] bg-gray-900 px-3 py-1 rounded-full border border-gray-700 hover:border-yellow-500 transition-colors">CON TELÉFONO</button>
                        </div>
                    </div>
                    <div id="results-list" class="divide-y divide-gray-700 max-h-[500px] overflow-y-auto custom-scrollbar">
                        <div class="p-12 text-center text-gray-500">
                            <p class="italic text-sm">El radar está inactivo. Ingrese una comuna de Chile para desplegar el spider.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Inicialización del Mapa
        const map = L.map('map', { zoomControl: false }).setView([-33.4489, -70.6693], 12);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let markers = [];
        let allLocales = [];
        let activeFilters = {
            apto: false,
            disco: false,
            phone: false
        };

        function toggleFilter(filter) {
            activeFilters[filter] = !activeFilters[filter];
            const btn = document.getElementById(`filter-${filter}`);

            const colors = {
                apto: 'border-green-500 text-green-500',
                disco: 'border-blue-500 text-blue-500',
                phone: 'border-yellow-500 text-yellow-500'
            };

            if (activeFilters[filter]) {
                btn.className = `filter-btn text-[10px] bg-gray-900 px-3 py-1 rounded-full border ${colors[filter]} transition-colors`;
            } else {
                btn.className = `filter-btn text-[10px] bg-gray-900 px-3 py-1 rounded-full border border-gray-700 hover:${colors[filter].split(' ')[0]} transition-colors`;
            }

            applyFilters();
        }

        function applyFilters() {
            let filtered = allLocales;

            if (activeFilters.apto) {
                filtered = filtered.filter(l => l.apto_show);
            }
            if (activeFilters.disco) {
                filtered = filtered.filter(l => l.tipo && l.tipo.toLowerCase().includes('disco'));
            }
            if (activeFilters.phone) {
                filtered = filtered.filter(l => l.telefono && l.telefono.trim() !== "");
            }

            updateResultsList(filtered);
            updateMarkers(filtered);
            updateStats(filtered);
        }

        function updateStats(locales) {
            document.getElementById('stat-total').innerText = locales.length;
            document.getElementById('stat-aptos').innerText = locales.filter(l => l.apto_show).length;
            document.getElementById('stat-discos').innerText = locales.filter(l => l.tipo && l.tipo.toLowerCase().includes('disco')).length;
            document.getElementById('stat-phone').innerText = locales.filter(l => l.telefono && l.telefono.trim() !== "").length;
        }

        function setRadius(r) {
            document.getElementById('search-radius').value = r;
            document.querySelectorAll('.radius-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'border-indigo-500', 'font-bold');
                btn.classList.add('bg-gray-900', 'border-gray-700');
                if(btn.innerText.includes(r)) {
                    btn.classList.add('bg-indigo-600', 'border-indigo-500', 'font-bold');
                    btn.classList.remove('bg-gray-900', 'border-gray-700');
                }
            });
        }

        async function loadLocales() {
            const res = await fetch('/api/locales');
            allLocales = await res.json();
            applyFilters();
        }

        function updateMarkers(locales) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            locales.forEach(l => {
                if(l.latitud && l.longitud) {
                    const color = l.apto_show ? '#10b981' : '#6366f1';
                    const marker = L.circleMarker([l.latitud, l.longitud], {
                        radius: 8,
                        fillColor: color,
                        color: "#fff",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map).bindPopup(`<b>${l.nombre}</b><br>${l.comuna}`);
                    markers.push(marker);
                }
            });
        }

        function updateResultsList(locales) {
            const list = document.getElementById('results-list');
            if(locales.length === 0) {
                list.innerHTML = '<div class="p-12 text-center text-gray-500"><p class="italic text-sm">No se encontraron locales con los filtros activos.</p></div>';
                return;
            }

            list.innerHTML = locales.map(l => `
                <div class="p-4 hover:bg-gray-750 transition-colors card-boliche border-l-4 ${l.apto_show ? 'border-green-500' : 'border-indigo-500'}">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center space-x-2">
                                <h4 class="font-bold text-lg">${l.nombre}</h4>
                                <span class="text-[10px] bg-gray-700 px-2 py-0.5 rounded uppercase font-bold text-gray-300">${l.tipo || 'Pendiente'}</span>
                            </div>
                            <p class="text-xs text-gray-400 mb-1">${l.direccion} | ${l.comuna}</p>
                            ${l.contacto_nombre ? `<p class="text-xs text-indigo-300 mb-2 font-medium">👤 Contacto: ${l.contacto_nombre}</p>` : ''}
                            <div class="flex space-x-3 items-center">
                                ${l.instagram ? `<a href="${l.instagram}" target="_blank" class="text-pink-500 hover:underline text-[10px] flex items-center"><svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c.796 0 1.441.645 1.441 1.44s-.645 1.44-1.441 1.44c-.795 0-1.44-.645-1.44-1.44s.645-1.44 1.44-1.44z"/></svg>Instagram</a>` : ''}
                                ${l.facebook ? `<a href="${l.facebook}" target="_blank" class="text-blue-500 hover:underline text-[10px] flex items-center"><svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>Facebook</a>` : ''}
                                ${l.twitter ? `<a href="${l.twitter}" target="_blank" class="text-gray-400 hover:underline text-[10px] flex items-center"><svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>Twitter</a>` : ''}
                                ${l.telefono ? `<span class="text-green-400 text-[10px] flex items-center font-bold">📞 ${l.telefono}</span>` : ''}
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="block text-xl font-black text-indigo-400">${l.score || 0}</span>
                            <span class="text-[8px] uppercase font-bold text-gray-500 tracking-widest">Lead Score</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('start-scan').addEventListener('click', async () => {
            const city = document.getElementById('target-city').value;
            const radius = document.getElementById('search-radius').value;

            if(!city) {
                alert('Ingrese una comuna de Chile');
                return;
            }

            const btn = document.getElementById('start-scan');
            btn.innerText = "RADAR EN CURSO...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/radar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ city, radius })
                });
                const data = await res.json();

                if(data.error) {
                    alert(data.error);
                } else {
                    map.setView([data.centro.lat, data.centro.lng], 10);
                    // Dibujar círculo de radio
                    L.circle([data.centro.lat, data.centro.lng], {
                        radius: radius * 1000,
                        color: '#4f46e5',
                        fillColor: '#4f46e5',
                        fillOpacity: 0.1
                    }).addTo(map);

                    alert(`Radar activado. Cubriendo ${data.total_comunas} comunas en un radio de ${radius}km.`);
                }
            } catch (e) {
                console.error(e);
            } finally {
                btn.innerText = "INICIAR SPIDER CHILE";
                btn.disabled = false;
            }
        });

        // Carga inicial
        loadLocales();
    </script>
</body>
</html>
